<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OCR ANALISIS TOGEL 2D</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  padding:20px;
  margin:0;
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:14px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#1d4ed8;
}

textarea{
  width:100%;
  height:120px;
  margin-top:15px;
  background:#0f172a;
  color:white;
  border:1px solid #334155;
  border-radius:10px;
  padding:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.result-card{
  background:#334155;
  padding:15px;
  border-radius:12px;
}

.line{
  background:#16a34a;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.loading{
  text-align:center;
  color:yellow;
  margin-top:10px;
}

.title{
  text-align:center;
  margin-bottom:15px;
  font-size:20px;
  font-weight:bold;
}

</style>
</head>
<body>

<h1>OCR ANALISIS TOGEL 2D</h1>

<div class="card">

<div class="title">UPLOAD HISTORY RESULT</div>

<input type="file" id="imageInput" accept="image/*"/>

<button onclick="scanOCR()">
SCAN OCR
</button>

<div class="loading" id="loading"></div>

<textarea id="ocrResult"></textarea>

</div>

<div class="grid">

<div class="result-card">
<h3>TOP 4 FREKUENSI</h3>
<div id="frequencyResult"></div>
</div>

<div class="result-card">
<h3>TOP 4 GANJIL GENAP</h3>
<div id="oddEvenResult"></div>
</div>

<div class="result-card">
<h3>TOP 4 BESAR KECIL</h3>
<div id="bigSmallResult"></div>
</div>

<div class="result-card">
<h3>TOP 4 HOT DIGIT</h3>
<div id="hotDigitResult"></div>
</div>

<div class="result-card">
<h3>TOP 4 TRANSISI</h3>
<div id="transitionResult"></div>
</div>

<div class="result-card">
<h3>TOP 4 TAMBAH KURANG</h3>
<div id="plusMinusResult"></div>
</div>

</div>

<script>

let historyNumbers = [];

async function scanOCR(){

  const file =
    document.getElementById('imageInput').files[0];

  if(!file){
    alert('Pilih gambar dulu');
    return;
  }

  document.getElementById('loading').innerText =
    'Scanning OCR...';

  const result = await Tesseract.recognize(
    file,
    'eng',
    {
      tessedit_char_whitelist:'0123456789'
    }
  );

  let text = result.data.text;

  document.getElementById('ocrResult').value = text;

  processHistory(text);

  document.getElementById('loading').innerText =
    'OCR selesai';
}

function processHistory(text){

  text = text
    .replace(/O/g,'0')
    .replace(/I/g,'1')
    .replace(/Z/g,'2')
    .replace(/S/g,'5')
    .replace(/B/g,'8');

  const rawNumbers = text.match(/\d+/g);

  if(!rawNumbers){
    alert('Tidak ada angka');
    return;
  }

  let results = [];

  rawNumbers.forEach(num=>{

    if(num.length >= 2){

      results.push(
        num.slice(-2)
      );

    }

  });

  if(results.length === 0){
    alert('Tidak ada angka 2D ditemukan');
    return;
  }

  historyNumbers = results;

  console.log(historyNumbers);

  startAnalysis();
}

function startAnalysis(){

  generateFrequencyLines();

  generateOddEvenLines();

  generateBigSmallLines();

  generateHotDigitLines();

  generateTransitionLines();

  generatePlusMinusLines();
}

function createLines(target,data){

  let html = '';

  data.forEach((num,index)=>{

    html += `
      <div class="line">
        LINE ${index+1} : ${num}
      </div>
    `;

  });

  document.getElementById(target).innerHTML = html;
}

function getDigitFrequency(){

  let freq = {};

  for(let i=0;i<=9;i++){
    freq[i] = 0;
  }

  historyNumbers.forEach(num=>{

    freq[num[0]]++;
    freq[num[1]]++;

  });

  return freq;
}

function generateFrequencyLines(){

  let freq = getDigitFrequency();

  let sorted =
    Object.entries(freq)
    .sort((a,b)=>b[1]-a[1]);

  let digits =
    sorted.slice(0,4).map(x=>x[0]);

  let lines = [];

  lines.push(digits[0]+digits[1]);
  lines.push(digits[1]+digits[2]);
  lines.push(digits[2]+digits[3]);
  lines.push(digits[0]+digits[3]);

  createLines(
    'frequencyResult',
    lines
  );
}

function generateOddEvenLines(){

  let odd = ['1','3','5','7','9'];
  let even = ['0','2','4','6','8'];

  let lines = [];

  for(let i=0;i<4;i++){

    let a =
      odd[
        Math.floor(Math.random()*odd.length)
      ];

    let b =
      even[
        Math.floor(Math.random()*even.length)
      ];

    lines.push(a+b);
  }

  createLines(
    'oddEvenResult',
    lines
  );
}

function generateBigSmallLines(){

  let big = ['5','6','7','8','9'];
  let small = ['0','1','2','3','4'];

  let lines = [];

  for(let i=0;i<4;i++){

    let a =
      small[
        Math.floor(Math.random()*small.length)
      ];

    let b =
      big[
        Math.floor(Math.random()*big.length)
      ];

    lines.push(a+b);
  }

  createLines(
    'bigSmallResult',
    lines
  );
}

function generateHotDigitLines(){

  let freq = getDigitFrequency();

  let sorted =
    Object.entries(freq)
    .sort((a,b)=>b[1]-a[1]);

  let hot =
    sorted.slice(0,2).map(x=>x[0]);

  let lines = [];

  lines.push(hot[0]+hot[0]);
  lines.push(hot[0]+hot[1]);
  lines.push(hot[1]+hot[0]);
  lines.push(hot[1]+hot[1]);

  createLines(
    'hotDigitResult',
    lines
  );
}

function generateTransitionLines(){

  let lines = [];

  historyNumbers.slice(-4).forEach(num=>{

    let a = parseInt(num[0]);
    let b = parseInt(num[1]);

    a = (a+1)%10;
    b = (b+1)%10;

    lines.push(`${a}${b}`);

  });

  createLines(
    'transitionResult',
    lines
  );
}

function generatePlusMinusLines(){

  let lines = [];

  historyNumbers.slice(-4).forEach(num=>{

    let a = parseInt(num[0]);
    let b = parseInt(num[1]);

    let plus1 =
      ((a+1)%10).toString() +
      ((b+1)%10).toString();

    let minus1 =
      ((a+9)%10).toString() +
      ((b+9)%10).toString();

    lines.push(plus1);

    if(lines.length < 4){
      lines.push(minus1);
    }

  });

  lines = lines.slice(0,4);

  createLines(
    'plusMinusResult',
    lines
  );
}

</script>

</body>
</html>
