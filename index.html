<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI POLA KENAIKAN PENURUNAN</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

input{
    width:100%;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

textarea{
    width:100%;
    height:130px;
    margin-top:15px;
    background:#0f172a;
    color:white;
    border:1px solid #334155;
    border-radius:10px;
    padding:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:15px;
}

.box{
    background:#334155;
    border-radius:12px;
    padding:15px;
}

.title{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-bottom:15px;
}

.result{
    background:#16a34a;
    padding:15px;
    border-radius:12px;
    word-break:break-word;
    overflow-wrap:anywhere;
    line-height:1.8;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

.copyBtn{
    margin-top:12px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.copyBtn:hover{
    background:#1d4ed8;
}

.loading{
    text-align:center;
    color:yellow;
    margin-top:10px;
}

.stats{
    background:#0f172a;
    padding:12px;
    border-radius:10px;
    line-height:1.8;
}

</style>
</head>
<body>

<h1>AI POLA KENAIKAN & PENURUNAN</h1>

<div class="card">

<input type="file" id="imageInput" accept="image/*">

<button onclick="scanOCR()">
SCAN OCR HISTORY
</button>

<div class="loading" id="loading"></div>

<textarea id="ocrText"></textarea>

</div>

<div class="card">

<div class="stats" id="stats"></div>

</div>

<div class="grid">

<div class="box">
<div class="title">POLA KENAIKAN</div>
<div id="upResult"></div>
</div>

<div class="box">
<div class="title">POLA PENURUNAN</div>
<div id="downResult"></div>
</div>

<div class="box">
<div class="title">POLA ZIGZAG</div>
<div id="zigzagResult"></div>
</div>

<div class="box">
<div class="title">FINAL AI FILTER 2D</div>
<div id="final2dResult"></div>
</div>

<div class="box">
<div class="title">FINAL AI FILTER 4D</div>
<div id="final4dResult"></div>
</div>

</div>

<script>

let history2D = [];
let history4D = [];

let upLines = [];
let downLines = [];
let zigzagLines = [];

async function scanOCR(){

    const file =
        document.getElementById('imageInput').files[0];

    if(!file){
        alert('Pilih gambar dulu');
        return;
    }

    document.getElementById('loading').innerText =
        'Scanning OCR...';

    const result = await Tesseract.recognize(
        file,
        'eng',
        {
            tessedit_char_whitelist:'0123456789'
        }
    );

    let text = result.data.text;

    document.getElementById('ocrText').value =
        text;

    processOCR(text);

    document.getElementById('loading').innerText =
        'OCR selesai';
}

function processOCR(text){

    text = text
        .replace(/O/g,'0')
        .replace(/I/g,'1')
        .replace(/Z/g,'2')
        .replace(/S/g,'5')
        .replace(/B/g,'8');

    const numbers = text.match(/\d+/g);

    if(!numbers){
        alert('Tidak ada angka');
        return;
    }

    history2D = [];
    history4D = [];

    numbers.forEach(num=>{

        if(num.length >= 4){

            history4D.push(
                num.slice(-4)
            );

            history2D.push(
                num.slice(-2)
            );

        }

        else if(num.length >= 2){

            history2D.push(
                num.slice(-2)
            );

        }

    });

    showStats();

    runAnalysis();
}

function showStats(){

    document.getElementById('stats').innerHTML = `
        Total History 2D : ${history2D.length}<br>
        Total History 4D : ${history4D.length}<br>
        Analisa Fokus : Pola Naik Turun<br>
        AI Filter : Aktif
    `;
}

function runAnalysis(){

    generateUpPattern();

    generateDownPattern();

    generateZigzagPattern();

    generateFinal2D();

    generateFinal4D();
}

function generateUpPattern(){

    upLines = [];

    history2D
        .slice(-10)
        .forEach(num=>{

        let a = parseInt(num[0]);
        let b = parseInt(num[1]);

        a = (a+1)%10;
        b = (b+1)%10;

        upLines.push(
            `${a}${b}`
        );

    });

    upLines =
        [...new Set(upLines)]
        .slice(0,10);

    render(
        'upResult',
        upLines
    );
}

function generateDownPattern(){

    downLines = [];

    history2D
        .slice(-10)
        .forEach(num=>{

        let a = parseInt(num[0]);
        let b = parseInt(num[1]);

        a = (a+9)%10;
        b = (b+9)%10;

        downLines.push(
            `${a}${b}`
        );

    });

    downLines =
        [...new Set(downLines)]
        .slice(0,10);

    render(
        'downResult',
        downLines
    );
}

function generateZigzagPattern(){

    zigzagLines = [];

    history2D
        .slice(-10)
        .forEach(num=>{

        let a = parseInt(num[0]);
        let b = parseInt(num[1]);

        let up =
            ((a+1)%10).toString() +
            ((b+9)%10).toString();

        let down =
            ((a+9)%10).toString() +
            ((b+1)%10).toString();

        zigzagLines.push(up);
        zigzagLines.push(down);

    });

    zigzagLines =
        [...new Set(zigzagLines)]
        .slice(0,10);

    render(
        'zigzagResult',
        zigzagLines
    );
}

function generateFinal2D(){

    let all = [];

    all.push(...upLines);
    all.push(...downLines);
    all.push(...zigzagLines);

    let unique =
        [...new Set(all)];

    let scored = [];

    unique.forEach(num=>{

        let score = 0;

        let a = parseInt(num[0]);
        let b = parseInt(num[1]);

        if(a < b){
            score += 10;
        }

        if(Math.abs(a-b)<=3){
            score += 5;
        }

        if(a%2 !== b%2){
            score += 5;
        }

        score += Math.random()*3;

        scored.push({
            num,
            score
        });

    });

    scored.sort((a,b)=>b.score-a.score);

    let final =
        scored
        .slice(0,20)
        .map(x=>x.num);

    render(
        'final2dResult',
        final
    );
}

function generateFinal4D(){

    if(history4D.length === 0){

        document.getElementById('final4dResult')
        .innerHTML =
            '<div class=\"result\">Tidak ada data 4D</div>';

        return;
    }

    let candidates = [];

    history4D
        .slice(-20)
        .forEach(num=>{

        let d = num.split('');

        let p1 =
            ((parseInt(d[0])+1)%10).toString();

        let p2 =
            ((parseInt(d[1])+1)%10).toString();

        let p3 =
            ((parseInt(d[2])+9)%10).toString();

        let p4 =
            ((parseInt(d[3])+9)%10).toString();

        let next =
            p1+p2+p3+p4;

        let score = 0;

        let unique =
            new Set(next.split('')).size;

        score += unique * 10;

        let upCount = 0;
        let downCount = 0;

        for(let i=1;i<next.length;i++){

            let prev =
                parseInt(next[i-1]);

            let curr =
                parseInt(next[i]);

            if(curr > prev){
                upCount++;
            }

            if(curr < prev){
                downCount++;
            }

        }

        score += upCount * 5;
        score += downCount * 5;

        score += Math.random()*5;

        candidates.push({
            num:next,
            score
        });

    });

    candidates.sort((a,b)=>b.score-a.score);

    let final = [];
    let used = new Set();

    candidates.forEach(c=>{

        if(
            !used.has(c.num) &&
            final.length < 20
        ){

            used.add(c.num);

            final.push(c.num);

        }

    });

    render(
        'final4dResult',
        final
    );
}

function render(target,lines){

    let unique =
        [...new Set(lines)];

    let format =
        unique.join('*');

    let html = `
    
    <div class="result">
        ${format}
    </div>

    <button
        class="copyBtn"
        onclick="copyText('${format}')"
    >
        COPY
    </button>

    `;

    document.getElementById(target).innerHTML =
        html;
}

function copyText(text){

    navigator.clipboard.writeText(text);

    alert('Berhasil di copy');
}

</script>

</body>
</html>
