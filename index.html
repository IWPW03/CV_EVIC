<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR Statistik History 4D</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0;padding:20px}
.card{background:#1e293b;border-radius:14px;padding:16px;margin-bottom:16px}
h1{text-align:center}
textarea{width:100%;height:120px;background:#020617;color:#fff}
button{padding:10px 14px;border:none;border-radius:8px;cursor:pointer}
.primary{width:100%}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.result{background:#020617;padding:10px;border-radius:8px;word-break:break-all}
</style>
</head>
<body>
<h1>OCR Statistik History 4D</h1>

<div class="card">
<input type="file" id="imageInput" accept="image/*">
<button class="primary" onclick="scanOCR()">SCAN OCR</button>
<textarea id="ocrText"></textarea>
</div>
<div id="loadingBox" style="display:none; margin-top:15px;">
    
    <div style="
        background:#1e293b;
        padding:15px;
        border-radius:10px;
        text-align:center;
    ">
        
        <div style="
            width:40px;
            height:40px;
            border:4px solid #334155;
            border-top:4px solid #3b82f6;
            border-radius:50%;
            margin:auto;
            animation:spin 1s linear infinite;
        "></div>

        <div style="margin-top:10px;">
            Scanning OCR...
        </div>

        <div id="progressText">
            0%
        </div>

    </div>

</div>

<div class="grid">

<div class="card">
    <h3>Hot Digit</h3>
    <div id="hot" class="result"></div>

    <button
        class="copyBtn"
        onclick="copyElement('hot')">
        COPY HOT
    </button>
</div>

<div class="card">
    <h3>Cool Digit</h3>
    <div id="cool" class="result"></div>

    <button
        class="copyBtn"
        onclick="copyElement('cool')">
        COPY COOL
    </button>
</div>

<div class="card">
    <h3>AS Custom Rank</h3>
    <div id="as" class="result"></div>

    <button
        class="copyBtn"
        onclick="copyElement('as')">
        COPY AS
    </button>
</div>

<div class="card">
    <h3>KOP Custom Rank</h3>
    <div id="kop" class="result"></div>

    <button
        class="copyBtn"
        onclick="copyElement('kop')">
        COPY KOP
    </button>
</div>

<div class="card">
    <h3>KEPALA Custom Rank</h3>
    <div id="kepala" class="result"></div>

    <button
        class="copyBtn"
        onclick="copyElement('kepala')">
        COPY KEPALA
    </button>
</div>

<div class="card">
    <h3>EKOR Custom Rank</h3>
    <div id="ekor" class="result"></div>

    <button
        class="copyBtn"
        onclick="copyElement('ekor')">
        COPY EKOR
    </button>
</div>

</div>

<script>
let history4D=[];

async function scanOCR(){

    const file =
        document.getElementById('imageInput').files[0];

    if(!file){

        alert('Pilih gambar dulu');

        return;
    }

    document.getElementById(
        'loadingBox'
    ).style.display = 'block';

    const result =
        await Tesseract.recognize(
            file,
            'eng',
            {
                logger: m => {

                    if(
                        m.status ===
                        'recognizing text'
                    ){

                        const percent =
                            Math.floor(
                                m.progress * 100
                            );

                        document.getElementById(
                            'progressText'
                        ).innerText =
                            percent + '%';

                    }

                }
            }
        );

    document.getElementById(
        'ocrText'
    ).value =
        result.data.text;

    document.getElementById(
        'loadingBox'
    ).style.display = 'none';

    processOCR(
        result.data.text
    );
}

function processOCR(text){
 const nums=(text.match(/\d{4}/g)||[]);
 history4D=nums;
 analyze();
}

function calculatePositionFrequency(history){
 const asFreq={},kopFreq={},kepalaFreq={},ekorFreq={};
 for(let i=0;i<=9;i++){asFreq[i]=0;kopFreq[i]=0;kepalaFreq[i]=0;ekorFreq[i]=0;}
 history.forEach(n=>{
   asFreq[n[0]]++; kopFreq[n[1]]++; kepalaFreq[n[2]]++; ekorFreq[n[3]]++;
 });
 return {asFreq,kopFreq,kepalaFreq,ekorFreq};
}

function rankDigits(obj){
 return Object.entries(obj).sort((a,b)=>b[1]-a[1]);
}

function getCustomRank(sorted){
 const picks=[0,1,4,5,8,9];
 return picks.filter(i=>sorted[i]).map(i=>sorted[i][0]);
}

function allDigitFreq(history){
 const f={}; for(let i=0;i<=9;i++)f[i]=0;
 history.forEach(n=>n.split('').forEach(d=>f[d]++));
 return Object.entries(f).sort((a,b)=>b[1]-a[1]);
}

function analyze(){
 const freq=calculatePositionFrequency(history4D);

 document.getElementById('as').innerText=getCustomRank(rankDigits(freq.asFreq)).join('');
 document.getElementById('kop').innerText=getCustomRank(rankDigits(freq.kopFreq)).join('');
 document.getElementById('kepala').innerText=getCustomRank(rankDigits(freq.kepalaFreq)).join('');
 document.getElementById('ekor').innerText=getCustomRank(rankDigits(freq.ekorFreq)).join('');

 const all=allDigitFreq(history4D);
 document.getElementById('hot').innerText=all.slice(0,10).map(x=>x[0]).join('');
 document.getElementById('cool').innerText=all.slice().reverse().slice(0,10).map(x=>x[0]).join('');
}
    function copyElement(id){

    const text =
        document.getElementById(id)
        .innerText;

    navigator.clipboard.writeText(text);

    alert('Berhasil di copy');
}
</script>
    
</body>
</html>
