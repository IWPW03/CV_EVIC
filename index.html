<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI OCR ANALISIS TOGEL 2D & 4D</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>

body{
    margin:0;
    padding:20px;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

h1{
    text-align:center;
    margin-bottom:25px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

input{
    width:100%;
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:140px;
    margin-top:15px;
    background:#0f172a;
    color:white;
    border:1px solid #334155;
    border-radius:10px;
    padding:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:15px;
}

.result-box{
    background:#334155;
    border-radius:12px;
    padding:15px;
}

.result-title{
    font-size:18px;
    font-weight:bold;
    text-align:center;
    margin-bottom:15px;
}

.line{
    background:#16a34a;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.loading{
    text-align:center;
    color:yellow;
    margin-top:10px;
}

</style>
</head>
<body>

<h1>AI OCR ANALISIS TOGEL 2D & 4D</h1>

<div class="card">

<input type="file" id="imageInput" accept="image/*">

<button onclick="scanOCR()">
SCAN OCR
</button>

<div class="loading" id="loading"></div>

<textarea id="ocrText"></textarea>

</div>

<div class="grid">

<div class="result-box">
<div class="result-title">TOP 4 FREKUENSI</div>
<div id="frequencyResult"></div>
</div>

<div class="result-box">
<div class="result-title">TOP 4 GANJIL GENAP</div>
<div id="oddEvenResult"></div>
</div>

<div class="result-box">
<div class="result-title">TOP 4 BESAR KECIL</div>
<div id="bigSmallResult"></div>
</div>

<div class="result-box">
<div class="result-title">TOP 4 HOT DIGIT</div>
<div id="hotDigitResult"></div>
</div>

<div class="result-box">
<div class="result-title">TOP 4 TRANSISI</div>
<div id="transitionResult"></div>
</div>

<div class="result-box">
<div class="result-title">TOP 4 TAMBAH KURANG</div>
<div id="plusMinusResult"></div>
</div>

<div class="result-box">
<div class="result-title">TOP 4 AI FILTER 4D</div>
<div id="top4dResult"></div>
</div>

</div>

<script>

let history2D = [];
let history4D = [];

async function scanOCR(){

    const file =
        document.getElementById('imageInput').files[0];

    if(!file){
        alert('Pilih gambar dulu');
        return;
    }

    document.getElementById('loading').innerText =
        'Scanning OCR...';

    const result = await Tesseract.recognize(
        file,
        'eng',
        {
            tessedit_char_whitelist:'0123456789'
        }
    );

    let text = result.data.text;

    document.getElementById('ocrText').value = text;

    processHistory(text);

    document.getElementById('loading').innerText =
        'OCR selesai';
}

function processHistory(text){

    text = text
        .replace(/O/g,'0')
        .replace(/I/g,'1')
        .replace(/Z/g,'2')
        .replace(/S/g,'5')
        .replace(/B/g,'8');

    const numbers = text.match(/\d+/g);

    if(!numbers){
        alert('Tidak ada angka');
        return;
    }

    history2D = [];
    history4D = [];

    numbers.forEach(num=>{

        if(num.length >= 4){

            history4D.push(
                num.slice(-4)
            );

            history2D.push(
                num.slice(-2)
            );

        }

        else if(num.length >= 2){

            history2D.push(
                num.slice(-2)
            );

        }

    });

    if(history2D.length === 0){
        alert('Tidak ada data 2D');
        return;
    }

    startAnalysis();
}

function startAnalysis(){

    generateFrequencyLines();

    generateOddEvenLines();

    generateBigSmallLines();

    generateHotDigitLines();

    generateTransitionLines();

    generatePlusMinusLines();

    generateTop4D();
}

function renderLines(target,lines){

    let html = '';

    lines.forEach((num,index)=>{

        html += `
            <div class="line">
                LINE ${index+1} : ${num}
            </div>
        `;

    });

    document.getElementById(target).innerHTML =
        html;
}

function getDigitFreq(){

    let freq = {};

    for(let i=0;i<=9;i++){
        freq[i]=0;
    }

    history2D.forEach(num=>{

        freq[num[0]]++;
        freq[num[1]]++;

    });

    return freq;
}

function generateFrequencyLines(){

    let freq = getDigitFreq();

    let sorted =
        Object.entries(freq)
        .sort((a,b)=>b[1]-a[1]);

    let d =
        sorted.slice(0,4).map(x=>x[0]);

    let lines = [];

    lines.push(d[0]+d[1]);
    lines.push(d[1]+d[2]);
    lines.push(d[2]+d[3]);
    lines.push(d[0]+d[3]);

    renderLines(
        'frequencyResult',
        lines
    );
}

function generateOddEvenLines(){

    let odd=['1','3','5','7','9'];
    let even=['0','2','4','6','8'];

    let lines=[];

    while(lines.length < 4){

        let a =
            odd[
                Math.floor(Math.random()*odd.length)
            ];

        let b =
            even[
                Math.floor(Math.random()*even.length)
            ];

        let num = a+b;

        if(!lines.includes(num)){
            lines.push(num);
        }
    }

    renderLines(
        'oddEvenResult',
        lines
    );
}

function generateBigSmallLines(){

    let big=['5','6','7','8','9'];
    let small=['0','1','2','3','4'];

    let lines=[];

    while(lines.length < 4){

        let a =
            small[
                Math.floor(Math.random()*small.length)
            ];

        let b =
            big[
                Math.floor(Math.random()*big.length)
            ];

        let num = a+b;

        if(!lines.includes(num)){
            lines.push(num);
        }
    }

    renderLines(
        'bigSmallResult',
        lines
    );
}

function generateHotDigitLines(){

    let freq = getDigitFreq();

    let sorted =
        Object.entries(freq)
        .sort((a,b)=>b[1]-a[1]);

    let hot =
        sorted.slice(0,2).map(x=>x[0]);

    let lines=[];

    lines.push(hot[0]+hot[0]);
    lines.push(hot[0]+hot[1]);
    lines.push(hot[1]+hot[0]);
    lines.push(hot[1]+hot[1]);

    renderLines(
        'hotDigitResult',
        lines
    );
}

function generateTransitionLines(){

    let lines=[];

    history2D
        .slice(-4)
        .forEach(num=>{

        let a = parseInt(num[0]);
        let b = parseInt(num[1]);

        a = (a+1)%10;
        b = (b+1)%10;

        lines.push(`${a}${b}`);

    });

    renderLines(
        'transitionResult',
        lines
    );
}

function generatePlusMinusLines(){

    let lines=[];

    history2D
        .slice(-2)
        .forEach(num=>{

        let a = parseInt(num[0]);
        let b = parseInt(num[1]);

        let plus =
            ((a+1)%10).toString() +
            ((b+1)%10).toString();

        let minus =
            ((a+9)%10).toString() +
            ((b+9)%10).toString();

        lines.push(plus);
        lines.push(minus);

    });

    renderLines(
        'plusMinusResult',
        lines.slice(0,4)
    );
}

function generateTop4D(){

    if(history4D.length === 0){

        document.getElementById('top4dResult').innerHTML =
            '<div class=\"line\">Tidak ada data 4D</div>';

        return;
    }

    let digitFreq = {};

    for(let i=0;i<=9;i++){
        digitFreq[i]=0;
    }

    history4D.forEach(num=>{

        num.split('').forEach(d=>{

            digitFreq[d]++;

        });

    });

    let hotDigits =
        Object.entries(digitFreq)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,6)
        .map(x=>x[0]);

    let candidates=[];

    for(let i=0;i<500;i++){

        let num='';

        for(let j=0;j<4;j++){

            num +=
                hotDigits[
                    Math.floor(
                        Math.random()*hotDigits.length
                    )
                ];

        }

        let score = 0;

        let unique =
            new Set(num.split('')).size;

        score += unique * 5;

        num.split('').forEach(d=>{

            score += digitFreq[d];

        });

        if(
            !history4D.includes(num)
        ){

            candidates.push({
                num,
                score
            });

        }

    }

    candidates.sort((a,b)=>b.score-a.score);

    let final=[];

    let used = new Set();

    candidates.forEach(c=>{

        if(
            !used.has(c.num) &&
            final.length < 4
        ){

            used.add(c.num);

            final.push(c.num);

        }

    });

    renderLines(
        'top4dResult',
        final
    );
}

</script>

</body>
</html>
